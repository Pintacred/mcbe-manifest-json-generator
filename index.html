<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCBE Resource Pack manifest.json Generator</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link rel="icon" type="image/x-icon" href="./favicon.png">
</head>

<body>

  <div class="wholepage">
    <div class="main">
      <h1 style="text-align: center;"><span><img src="./favicon.png" alt="📝" style="width: 1em;"></span> MCBE Resource Pack
        manifest.json Generator</h1>

      <div id="mainDivision">
        <div id="leftDivision">
          <!-- general options for website -->
          <details class="separatorDiv">
            <summary><strong>GENERAL</strong></summary>
            <hr>

            <ul class="inputsList">
              <li>
                <input type="checkbox" id="darkmode">
                <label for="darkmode">Dark Mode</label>
              </li>
              <li>
                <!-- must be manifest.json (aka a json file) -->
                <label for="importFile">Import 'manifest.json' File:</label><br>
                <input type="file" id="importFile" accept=".json">
              </li>
            </ul>
          </details>

          <!-- header/modules -->
          <details class="separatorDiv" open>
            <summary><strong>HEADER & MODULES</strong></summary> <!-- make this into a collapsible -->
            <hr>
            <ul class="inputsList">
              <li>
                <label for="packname">Pack Name</label><br>
                <input type="text" id="packname" placeholder="Pack Name">
              </li>
              <li>
                <label for="packdesc">Pack Description</label><br>
                <textarea id="packdesc" rows="10" placeholder="Pack description"></textarea>
              </li>
              <li>
                <label for="versionA">Version</label>
                <br>
                <input type="number" id="versionA" min="0" value="0" size="2" class="supportsWarn">
                <input type="number" id="versionB" min="0" value="0" size="2" class="supportsWarn">
                <input type="number" id="versionC" min="0" value="1" size="2" class="supportsWarn">
              </li>
              <li>
                <label for="minEngineVerA">Min Game Version</label>
                <br>
                <input type="number" id="minEngineVerA" min="1" value="1" size="2" class="supportsWarn">
                <input type="number" id="minEngineVerB" min="0" value="26" size="2" class="supportsWarn">
                <input type="number" id="minEngineVerC" min="0" value="10" size="2" class="supportsWarn">
              </li>
              <li>
                <label for="headerUUID">Header UUID</label><br>
                <div style="display: flex; align-items: center; gap: 6px;">
                  <input type="text" id="headerUUID" style="flex-grow: 1;">
                  <button type="button" id="regenHeaderUUID" class="blueButton">
                    <span class="material-symbols-outlined">
                      autorenew
                    </span>
                  </button>
                </div>
              </li>
              <li>
                <label for="moduleUUID">Module UUID</label><br>
                <div style="display: flex; align-items: center; gap: 6px;">
                  <input type="text" id="moduleUUID" style="flex-grow: 1;">
                  <button type="button" id="regenModuleUUID" class="blueButton">
                    <span class="material-symbols-outlined">
                      autorenew
                    </span>
                  </button>
                </div>
              </li>
              <!--
            <li>
              <input type="checkbox" id="autoRefreshUUID" checked>
              <label for="autoRefreshUUID">Generate new UUIDs for every change</label>
              <br>
              <button style="height: 2em;">Generate New UUIDs</button>
            </li>
          -->
            </ul>
          </details>

          <!-- metadata -->
          <details class="separatorDiv">
            <summary><strong>METADATA<span class="OptionalLabel"> (Optional)</span></strong></summary>
            <hr>

            <ul class="inputsList">
              <li>
                <label for="authors">Author(s) (separate using new lines): </label><br>
                <textarea id="authors" rows="3"></textarea>
              </li>
              <li>
                <label for="metadataWebsiteURL">Website: </label><br>
                <input type="text" id="metadataWebsiteURL" placeholder="www._____...">
              </li>
            </ul>
          </details>

          <!-- capabilities -->
          <details class="separatorDiv">
            <summary><strong>CAPABILITIES<span class="OptionalLabel"> (Optional)</span></strong></summary>
            <hr>

            <ul class="inputsList">
              <li>
                <form>
                  <input type="checkbox" id="pbr" value="pbr" checked>
                  <label for="pbr">Supports Vibrant Visuals (Shaders)</label>
                  <br>
                  <input type="checkbox" id="expCustUI" value="experimental_custom_ui">
                  <label for="expCustUI">Can use Experimental Custom UI</label>
                  <br>
                  <input type="checkbox" id="raytraced" value="raytraced">
                  <label for="raytraced">Uses Ray Tracing Functionality</label>
                  <br>
                  <input type="checkbox" id="chem" value="chemistry">
                  <label for="chem">Can Modify Chemistry Behavior</label>
                  <br>
                  <input type="checkbox" id="editExt" value="editorExtension">
                  <label for="editExt">Contains Extensions for Minecraft Editor</label>
                </form>
              </li>
            </ul>

          </details>

          <!-- subpacks -->
          <details class="separatorDiv">
            <summary><strong>SUBPACKS<span class="OptionalLabel"> (Optional)</span></strong></summary>
            <!-- make this into a collapsible -->
            <br>
            <input type="button" value="+ Add New Subpack +" id="btnAddSubpack2" class="blueButton"
              style="width: 100%; height: 2em;" hidden>
            <div id="subpacksDiv"> <!-- space where added inputs go -->
            </div>
            <input type="button" value="+ Add New Subpack +" id="btnAddSubpack" class="blueButton"
              style="width: 100%; height: 2em;">
          </details>

          <!-- settings -->
          <details class="separatorDiv">
            <summary><strong>SETTINGS<span class="OptionalLabel"> (Optional)</span></strong></summary>
            <br>
            <input type="button" value="+ Add New Setting +" id="btnAddSettings2" class="blueButton"
              style="width: 100%; height: 2em;" hidden>
            <div id="settingsDiv"> <!-- space where added inputs go -->
            </div>
            <input type="button" value="+ Add New Setting +" id="btnAddSettings" class="blueButton"
              style="width: 100%; height: 2em;">
          </details>
        </div>
        <div id="rightDivision">
          <div class="separatorDiv">
            <div id="packPreviewOptions">
              <div style="flex: 0;">
                <!-- <label for="previewMode">Preview Mode:</label>
                        <select id="previewMode">
                            <option value="textFile">Text File</option>
                            <option value="ingameSettings">In-game Settings</option>
                        </select> -->
              </div>
              <div style="display: flex; justify-content: flex-end; gap: 0.25em;">
                <button type="button" id="copyToClipboardBtn" class="blueButton">
                  <span class="material-symbols-outlined">content_copy</span>
                  &nbsp;Copy text
                </button>

                <button type="button" id="downloadFileBtn" class="blueButton">
                  <span class="material-symbols-outlined">download</span>
                  &nbsp;Download manifest.json file
                </button>
              </div>
            </div>

            <div id="packPreviewFileText">
              <textarea id="copyableTextArea" readonly></textarea>
            </div>

            <!-- <div id="packPreviewIngame">
                    <div id="previewTitleAndDesc">
                        <img src="./Assets/pack_icon.png" alt="pack icon">
                        <p id="ingamePackname">PACK_NAME</p>
                        <p id="ingamePackdesc">PACK_DESCRIPTION</p>
                    </div>
                    <div id="previewSettings">
                        <canvas id="canvasSettingsPreview" style="image-rendering: crisp-edges;"></canvas>
                    </div>
                </div> -->
          </div>
        </div>
      </div>

      <br><br><br><br>
    </div>
